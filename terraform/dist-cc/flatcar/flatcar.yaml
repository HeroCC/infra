---
variant: flatcar
version: 1.1.0
passwd:
  users:
    - name: core
      ssh_authorized_keys:
        - "ssh-rsa  conlanc@skellige.local"

storage:
  files:
    - path: /etc/hostname
      mode: 0644
      overwrite: true
      contents:
        inline: ${ hostname }

    - path: /etc/sysupdate.d/noop.conf
      contents:
        source: https://github.com/flatcar/sysext-bakery/releases/download/latest/noop.conf

    # TODO can we get systemd-sysupdate to coldstart itself?
    - path: /opt/extensions/k3s/k3s-v1.31.1+k3s1-x86-64.raw
      contents:
        source: https://github.com/flatcar/sysext-bakery/releases/download/latest/k3s-v1.31.1+k3s1-x86-64.raw

    # We only want to upgrade k3s patch versions. Minor (aka major) versions can be done manually
    - path: /etc/sysupdate.k3s.d/k3s.conf
      contents:
        source: https://github.com/flatcar/sysext-bakery/releases/download/latest/k3s-v1.31.conf

    - path: /etc/rancher/k3s/config.yaml.d/00-k3s.yaml
      contents:
        inline: |
          %{ if role == "server" }
          write-kubeconfig-mode: 644
          disable: traefik,servicelb
          disable-helm-controller: true
          secrets-encryption: true
          %{ endif }

  links:
    - target: /opt/extensions/k3s/k3s-v1.31.1+k3s1-x86-64.raw
      path: /etc/extensions/k3s.raw
      hard: false

    - path: '/etc/systemd/system/multi-user.target.wants/${ role == "server" ? "k3s" : "k3s-agent"}.service'
      target: '/usr/local/lib/systemd/system/${ role == "server" ? "k3s" : "k3s-agent"}.service'
      overwrite: true

    # - path: /etc/extensions/docker-flatcar.raw
    #   target: /dev/null
    #   overwrite: true

    # - path: /etc/extensions/containerd-flatcar.raw
    #   target: /dev/null
    #   overwrite: true

systemd:
  units:
    - name: systemd-sysupdate.timer
      enabled: true

    - name: systemd-sysupdate.service
      dropins:
        - name: k3s.conf
          contents: |
            [Service]
            ExecStartPre=/usr/lib/systemd/systemd-sysupdate -C k3s update
        - name: sysext.conf
          contents: |
            [Service]
            ExecStartPost=systemctl restart systemd-sysext
            ExecStartPost=touch /run/reboot-required

    - name: '${ role == "server" ? "k3s" : "k3s-agent"}.service'
      enabled: true
      dropins:
        - name: 20_client_env.conf
          contents: |
            [Service]
            %{ if role == "server" }
            Environment=K3S_TOKEN=${ server_token }
            Environment=K3S_AGENT_TOKEN=${ agent_token }
            %{ else }
            Environment=K3S_TOKEN=${ agent_token }
            %{ endif }

    - name: zerotier.service
      enabled: true
      contents: |
        [Unit]
        Description=ZeroTier via Docker Service
        Requires=docker.service
        Wants=network-online.target

        [Service]
        TimeoutStartSec=0
        Restart=always
        ExecStartPre=-/usr/bin/docker exec %n stop
        ExecStartPre=-/usr/bin/docker rm %n
        ExecStartPre=/usr/bin/docker pull zerotier/zerotier:1.14.2
        ExecStart=/usr/bin/docker run --rm --name %n \
            --cap-add NET_ADMIN --cap-add SYS_ADMIN --device /dev/net/tun --network=host \
            -e ZEROTIER_JOIN_NETWORKS -e ZEROTIER_IDENTITY_PUBLIC -e ZEROTIER_IDENTITY_SECRET \
            zerotier/zerotier:1.14.2

        [Install]
        WantedBy=default.target
      dropins:
        - name: 20_zerotier_env.conf
          contents: |
            [Service]
            Environment=ZEROTIER_JOIN_NETWORKS=${ zerotier_network_id }
            Environment=ZEROTIER_IDENTITY_PUBLIC=${ zerotier_public_key }
            Environment=ZEROTIER_IDENTITY_SECRET=${ zerotier_private_key }

